name: Bookleet
options:
  bundleIdPrefix: com.bookleet
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  groupSortPosition: top
  fileTypes:
    icon:
      file: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  Bookleet:
    type: application
    platform: macOS
    sources:
      - path: Bookleet
        excludes:
          - Info.plist
          - Bookleet.entitlements
      - path: AppIcon.icon
    settings:
      base:
        PRODUCT_NAME: Bookleet
        PRODUCT_BUNDLE_IDENTIFIER: com.bookleet.Bookleet
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: Bookleet/Info.plist
        CODE_SIGN_ENTITLEMENTS: Bookleet/Bookleet.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        ENABLE_TESTABILITY: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        COMBINE_HIDPI_IMAGES: YES
        DEVELOPMENT_TEAM: ""
      configs:
        Debug:
          CODE_SIGN_STYLE: Automatic
        Release:
          CODE_SIGN_STYLE: Automatic
    scheme:
      testTargets:
        - BookleetTests
      gatherCoverageData: false

  BookleetTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: BookleetTests
    dependencies:
      - target: Bookleet
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bookleet.BookleetTests
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG

  BookleetCLI:
    type: tool
    platform: macOS
    sources:
      - path: BookleetCLI
      - path: Bookleet/BookletImposer.swift
      - path: Bookleet/BookletSettings.swift
      - path: Bookleet/LoadedDocument.swift
      - path: Bookleet/PDFDocument+Images.swift
    settings:
      base:
        PRODUCT_NAME: bookleet
        PRODUCT_BUNDLE_IDENTIFIER: com.bookleet.cli
        GENERATE_INFOPLIST_FILE: YES
    scheme:
      commandLineArguments:
        - --help

schemes:
  Bookleet:
    build:
      targets:
        Bookleet: all
        BookleetTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - BookleetTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

